# Lint-only CI: chiron is distributed as a plain git checkout, not a package.
name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck bin/chiron scripts/build-deb.sh eval/run.sh eval/report.sh eval/checks/*.sh adapters/claude-code/hooks/*.sh
      - name: Bash syntax
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
          bash -n bin/chiron
      - name: Python syntax
        run: python3 -m py_compile eval/report.py
      - name: No em dashes
        run: |
          if grep -rln $'\xe2\x80\x94' . --exclude-dir=.git; then
            echo 'em dash found; forbidden in this repo' >&2; exit 1
          fi
      - name: No AI attribution
        run: |
          # Bracketed first letters keep this pattern from matching its own
          # line; word boundaries keep 'ai' from matching inside words.
          if grep -rEin 'co-authored-by:\s*[c]laude|generated (with|by).*\b([c]laude|[a]i)\b|made by [a]i\b' . --exclude-dir=.git; then
            echo 'AI attribution found; forbidden in this repo' >&2; exit 1
          fi
      - name: Install + doctor self-test
        run: |
          proj="$(mktemp -d)"
          git init -q "$proj"
          bin/chiron install --project "$proj"
          bin/chiron doctor --project "$proj"
